<p>

Join thousands of students learning coding and preparing for JAMB & WAEC.

</p>

<section class="login-section">

<div class="login-card">

<h2>Sign Up</h2>

<form id="signupForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">

Create Account

</button>

</form>

<p>

Already have an account?

<a href="login.html">

Login Here

</a>

</p>

</div>

</section>

<script type="module" src="signup.js"></script>
